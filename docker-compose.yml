services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: bedtimenews-postgres
    env_file: .env
    environment:
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - ./storage/postgres/volume:/var/lib/postgresql
      - ./storage/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres_user} -d
            ${POSTGRES_DB:-postgres_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bedtimenews_net

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: bedtimenews-indexer
    env_file: .env
    environment:
      # Read from the host shell environment (not stored in .env)
      - SILICONFLOW_API_KEY
    volumes:
      - ./indexer/data:/data
      - bedtimenews_indexer_logs:/var/log/indexer
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bedtimenews_net

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: bedtimenews-agent
    env_file: .env
    environment:
      # Read from the host shell environment (not stored in .env)
      - DEEPSEEK_API_KEY
      - SILICONFLOW_API_KEY
    volumes:
      - bedtimenews_agent_logs:/var/log/agent
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bedtimenews_net

  chainlit:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bedtimenews-chainlit
    env_file: .env
    expose:
      - "8000"
    profiles:
      - public
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - bedtimenews_net

  chainlit-local:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bedtimenews-chainlit
    env_file: .env
    ports:
      - "8000:8000"
    profiles:
      - local
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - bedtimenews_net

  caddy:
    image: caddy:2-alpine
    container_name: bedtimenews-caddy
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - bedtimenews_caddy_data:/data
      - bedtimenews_caddy_config:/config
    profiles:
      - public
    depends_on:
      - chainlit
    restart: unless-stopped
    networks:
      - bedtimenews_net

volumes:
  bedtimenews_indexer_logs:
    driver: local
  bedtimenews_agent_logs:
    driver: local
  bedtimenews_caddy_data:
    driver: local
  bedtimenews_caddy_config:
    driver: local

networks:
  bedtimenews_net:
    driver: bridge
