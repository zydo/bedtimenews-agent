name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    name: ruff check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Install only the dev tooling group (ruff), not the component runtime
      # deps — linting needs nothing else. Uses the pinned version from uv.lock.
      - name: Install ruff
        run: uv sync --frozen --only-group dev

      - name: Run ruff check
        run: uv run --no-sync ruff check .
